spring:
  application:
    name: ResourceManagerPro
  profiles:
    default: dev

  datasource:
    url: jdbc:mariadb://localhost:3306/rmp?createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Josh@977}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true

# Application-specific configuration
app:
  jwt:
    secret: ${APP_JWT_SECRET:ZGV2LW9ubHktc2VjcmV0LWNoYW5nZS1tZS1pbi1wcm9kLTMyLWJ5dGVzLW1pbg==}
    access-token-ttl-minutes: 15
    refresh-token-ttl-days: 14
